[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "LibraryChecker/**/*.unsolved.py",
]

[tool.ruff.lint]
select = [
    "E9",
    "F63",
    "F7",
    "F82",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --exit-non-zero-on-fix
        language: python
        additional_dependencies:
          - ruff==0.12.10
        types_or:
          - python
          - pyi
        exclude: "^LibraryChecker/.*\\.unsolved\\.py$"

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: python
        additional_dependencies:
          - ruff==0.12.10
        types_or:
          - python
          - pyi
        exclude: "^LibraryChecker/.*\\.unsolved\\.py$"
